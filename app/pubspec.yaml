name: aura_diet
description: A premium mobile diet tracking app built with Flutter, Riverpod, and Supabase.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.3.1
  camera: ^0.11.0+1
  cupertino_icons: ^1.0.8
  fl_chart: ^0.68.0
  flutter_animate: ^4.5.0
  flutter_local_notifications: ^17.2.1+2
  flutter_riverpod: ^2.5.1
  firebase_messaging: ^15.0.4
  go_router: ^14.2.0
  google_fonts: ^6.2.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: ^1.1.2
  local_auth: ^2.2.0
  mobile_scanner: ^5.1.1
  purchases_flutter: ^6.29.0
  supabase_flutter: ^2.5.6

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
